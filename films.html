<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <title>Watchr</title>
</head>

<body>

  <header id="desktop">
    <img class="logo-header" src="img/logo2.png">
    <div id="pages-desktop">
      <a href="">
        <h1>Films</h1>
      </a>
      <a href="">
        <h1>Lists</h1>
      </a>
      <a href="">
        <h1>Members</h1>
      </a>
      <a href="">
        <h1>Journal</h1>
      </a>
    </div>
    <div id="right-desktop">
      <button class="signup">Sign in / Sign up</button>
      <input type="search" name="" class="search">
    </div>
    <div class="gradient"></div>
  </header>

  <header id="phone">

    <img class="logo-header" src="img/logo2.png">
    <div id="pages-phone">
      <a href="">

      <a href="">

      </a>

        <h1>Journal</h1>
      </a>
    </div>
    <div class="gradient"></div>
  </header>

  <script src="js/main.js"></script>

  <main id="films">
    <div id="featured">
      <div id="featured-text">
        <h2>Dune: Part Two</h2>
        <p>Paul Atreides unites with the Fremen to wage war against House Harkonnen.</p>
      </div>
    </div>

    <div id="regular">
      <div class="movie"
        style="background-image: url('https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg')">
        <div class="movie-title">Interstellar</div>
      </div>

      <div class="movie"
        style="background-image: url('https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg')">
        <div class="movie-title">The Dark Knight</div>
      </div>

      <div class="movie"

      </div>

        style="background-image: url('https://image.tmdb.org/t/p/w500/8Gxv8gSFCU0XGDykEGv7zR1n2ua.jpg')">
        <div class="movie-title">Oppenheimer</div>
      </div>

      <div class="movie"
        style="background-image: url('https://image.tmdb.org/t/p/w500/vZloFAK7NmvMGKE7VkF5UHaz0I.jpg')">
        <div class="movie-title">John Wick Chapter 4</div>
      </div>

      <div class="movie"
        style="background-image: url('https://image.tmdb.org/t/p/w500/f89U3ADr1oiB1s9GkdPOEpXUk5H.jpg')">

      <div class="movie"
        style="background-image: url('https://image.tmdb.org/t/p/w500/qdIMHd4sEfJSckfVJfKQvisL02a.jpg')">
        <div class="movie-title">Forest Gump</div>
      </div>
